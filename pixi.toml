[workspace]
name = "coverm"
version = "0.1.0"
description = "CoverM tool for computing various forms of DNA sequence coverage calculations"
channels = [
    "conda-forge",
    "bioconda",
]
platforms = [
    "linux-64",
    "osx-64",
    "osx-arm64",
]
preview = ["pixi-build"]      # make sure this is present

# Core dependencies that work across all platforms
[dependencies]
samtools = ">=1.9"
coreutils = "*"
minimap2 = ">=2.24"
bwa = ">=0.7.17"
skani = ">=0.2.2"
fastani = ">=1.3"
extern = "*"

# x86_64-specific dependencies
[target.linux-64.dependencies]
bwa-mem2 = "*"
# dashing removed: it hard-pins zlib<1.3 which conflicts with minibwa's
# libzlib>=1.3.2. dashing was only an optional galah precluster method (skani
# is the default), so dereplication is unaffected.
strobealign = ">=0.14.0"  # tests use a pregenerated v3 database
minibwa = ">=0.2"  # not available on osx-arm64

[target.osx-64.dependencies]
minibwa = ">=0.2"  # not available on osx-arm64

[package]
name = "coverm"
version = "0.1.0"  # keep this in sync with [workspace].version

[package.build]
backend = { name = "pixi-build-rattler-build", version = "0.3.*" }
# optional, if you want to override channels for the backend; otherwise it’ll
# reuse [workspace].channels, and pixi-build-rattler-build is on conda-forge anyway
# channels = ["https://prefix.dev/conda-forge"]
