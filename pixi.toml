[workspace]
name = "coverm"
version = "0.1.0"
description = "CoverM tool for computing various forms of DNA sequence coverage calculations"
channels = [
    "conda-forge",
    "bioconda",
]
platforms = [
    "linux-64",
    "osx-64",
    "osx-arm64",
]
preview = ["pixi-build"]      # make sure this is present

# Core dependencies that work across all platforms
[dependencies]
samtools = ">=1.9"
coreutils = "*"
minimap2 = ">=2.24"
bwa = ">=0.7.17"
skani = ">=0.2.2"
fastani = ">=1.3"
extern = "*"

# x86_64-specific dependencies
[target.linux-64.dependencies]
bwa-mem2 = "*"
dashing = ">=0.4.0,<1.0"  # dashing 1.0 build gives illegal instruction errors
strobealign = ">=0.14.0"  # tests use a pregenerated v3 database

# TODO: Remove this activation section and activate.sh when lexicmap is released
# to bioconda (currently only v0.8.1 is available; we need v0.9.0+ for `lexicmap utils 2sam`).
# Replace with: lexicmap = ">=0.9.0"  under [dependencies].
[activation]
scripts = ["activate.sh"]

[package]
name = "coverm"
version = "0.1.0"  # keep this in sync with [workspace].version
license = "GPL-3.0-or-later"

[package.build]
backend = { name = "pixi-build-rust", version = "0.4.*" }

